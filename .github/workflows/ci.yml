name: EdgeBrain CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f pyproject.toml ]; then pip install .; fi

    - name: Run Core Tests
      run: |
        # 验证核心模块导入与基础逻辑
        python -c "from src.edgebrain.core.engine import EdgeBrainEngine; print('Engine module loaded successfully')"
        python -c "from src.edgebrain.skills.loader import SkillLoader; print('Skill loader module loaded successfully')"
        python -c "from src.edgebrain.security.gateway import SecurityGateway; print('Security gateway module loaded successfully')"

    - name: Check Code Style (Optional)
      run: |
        pip install flake8
        # 停止构建如果存在语法错误或未定义的名称
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
